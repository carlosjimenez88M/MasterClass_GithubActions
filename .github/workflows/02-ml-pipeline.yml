name: 02 - Pipeline de Machine Learning (Eslabones Dependientes)

on:
  push:
    paths:
      # Solo ejecutara este flujo si hay cambios en src/, tests/, pyproject o en este mismo archivo
      - 'src/**'
      - 'tests/**'
      - 'pyproject.toml'
      - '.github/workflows/02-ml-pipeline.yml'
  workflow_dispatch:

jobs:
  # ==========================================
  # ESLABON 1: LINTING (Revision de sintaxis)
  # ==========================================
  linting:
    name: Revision de Codigo (Flake8)
    runs-on: ubuntu-latest
    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4
        
      - name: Instalar uv
        uses: astral-sh/setup-uv@v5
        
      - name: Configurar entorno
        run: uv python install 3.10
        
      - name: Sincronizar dependencias
        run: uv sync
        
      - name: Revisar calidad (Lint)
        run: uv run flake8 src/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics

  # ==========================================
  # ESLABON 2: TESTING (Pruebas unitarias)
  # ==========================================
  testing:
    name: Ejecucion de Pruebas Automaticas
    runs-on: ubuntu-latest
    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4
        
      - name: Instalar uv
        uses: astral-sh/setup-uv@v5
        
      - name: Configurar entorno
        run: uv python install 3.10
        
      - name: Sincronizar dependencias
        run: uv sync
        
      - name: Ejecutar pruebas
        env:
          PYTHONPATH: .
        run: uv run pytest tests/

  # ==========================================
  # ESLABON 3: ENTRENAMIENTO (ML)
  # ==========================================
  training:
    name: Entrenamiento del Modelo Iris
    runs-on: ubuntu-latest
    # AQUI ESTA LA MAGIA: Este eslabon depende explicitamente de los otros dos
    needs: [linting, testing]
    
    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4
        
      - name: Instalar uv
        uses: astral-sh/setup-uv@v5
        
      - name: Configurar entorno
        run: uv python install 3.10
        
      - name: Sincronizar dependencias (ML)
        run: uv sync
        
      - name: Entrenar el modelo
        env:
          PYTHONPATH: .
        run: uv run python src/train_iris.py
        
      - name: Subir Modelo como Artefacto
        uses: actions/upload-artifact@v4
        with:
          name: ml-model-iris
          path: models/iris_model.pkl
          retention-days: 7

  # ==========================================
  # ESLABON 4: DEPLOY SIMULADO
  # ==========================================
  deploy:
    name: Simular Despliegue en Servidor
    runs-on: ubuntu-latest
    # Depende de que el entrenamiento finalice correctamente
    needs: [training]
    
    steps:
      - name: Descargar Modelo Artefacto
        uses: actions/download-artifact@v4
        with:
          name: ml-model-iris
          path: models/
          
      - name: Mensaje de Despliegue
        run: |
          echo "=========================================================="
          echo "INICIANDO DESPLIEGUE A PRODUCCION..."
          echo "=========================================================="
          echo "Encontrando archivo de modelo guardado previamente:"
          ls -la models/
          echo "Simulando conexion a servicio de Nube (AWS/GCP/Azure)..."
          sleep 2
          echo "Subiendo modelo exitosamente..."
          echo "=========================================================="
          echo "EL MODELO ESTA VIVO Y LISTO PARA INFERENCIA!"
          echo "=========================================================="
