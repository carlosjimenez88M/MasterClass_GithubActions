name: 03 - Pipeline Completo de ML (Iris)

on:
  push:
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/03-ml-pipeline.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ==========================================
  # ESLABON 1: LINTING (revision de estilo)
  # ==========================================
  linting:
    name: Lint -- Revision de Codigo
    runs-on: ubuntu-latest
    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Instalar uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sincronizar dependencias
        run: uv sync

      - name: Ejecutar Flake8
        run: uv run flake8 src/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics

  # ==========================================
  # ESLABON 2: TESTING (pruebas unitarias)
  # ==========================================
  testing:
    name: Test -- Pruebas Unitarias
    runs-on: ubuntu-latest
    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Instalar uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sincronizar dependencias
        run: uv sync

      - name: Ejecutar Pytest
        run: uv run pytest tests/ -v

  # ==========================================
  # ESLABON 3: ENTRENAMIENTO DEL MODELO
  # Depende de que Lint y Test pasen
  # ==========================================
  training:
    name: Train -- Modelo Iris
    runs-on: ubuntu-latest
    needs: [linting, testing]
    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Instalar uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sincronizar dependencias
        run: uv sync

      - name: Entrenar modelo
        run: uv run python src/train_iris.py

      - name: Subir modelo como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: ml-model-iris
          path: models/iris_model.pkl
          retention-days: 7

  # ==========================================
  # ESLABON 4: DEPLOY SIMULADO
  # Depende de que Training termine
  # ==========================================
  deploy:
    name: Deploy -- Simulacion
    runs-on: ubuntu-latest
    needs: [training]
    steps:
      - name: Descargar artefacto del modelo
        uses: actions/download-artifact@v4
        with:
          name: ml-model-iris
          path: models/

      - name: Simular despliegue
        run: |
          echo "=========================================="
          echo " INICIANDO DESPLIEGUE A PRODUCCION"
          echo "=========================================="
          echo "Verificando modelo:"
          ls -lh models/
          echo "Simulando conexion a servicio cloud..."
          sleep 2
          echo "Modelo desplegado correctamente."
          echo "=========================================="
